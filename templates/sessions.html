<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
  <title>Sessions - MG4 Charger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script>
    // Apply dark mode immediately to prevent flash - default to dark
    if (localStorage.getItem('darkMode') !== 'false') {
      document.documentElement.classList.add('dark');
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    button {
      transition: transform 0.1s ease, opacity 0.1s ease, background-color 0.15s ease;
    }
    button:active:not(:disabled) {
      transform: scale(0.97);
      opacity: 0.9;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors">
  <!-- Header -->
  <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-10 transition-colors pt-[env(safe-area-inset-top)]">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
      <h1 class="text-xl font-semibold text-gray-900 dark:text-white">📋 Sessions</h1>
      <div class="flex items-center gap-3">
        <select id="userFilter" onchange="applyFilter()" class="text-sm rounded-lg border border-gray-300 dark:border-gray-600 py-2 pl-3 pr-8 text-gray-900 dark:text-white dark:bg-gray-700 focus:border-emerald-500 focus:ring-emerald-500">
          <option value="">All Users</option>
        </select>
        <button onclick="location.href='/'" class="text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-700 px-3 py-2 rounded-lg transition">← Back</button>
      </div>
    </div>
  </header>

  <!-- Loading State -->
  <div id="loadingState" class="flex items-center justify-center py-20">
    <div class="text-center text-gray-500 dark:text-gray-400">
      <svg class="w-8 h-8 mb-2 mx-auto animate-spin text-emerald-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
      <div>Loading sessions...</div>
    </div>
  </div>

  <!-- Main Content -->
  <main id="contentArea" class="p-4 sm:p-6 lg:p-8 max-w-5xl mx-auto" style="display:none;">
    <!-- Summary Stats -->
    <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm mb-4 transition-colors">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">📊 Summary</h2>
      <div id="stats"></div>
    </div>

    <!-- Charts -->
    <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm mb-4 transition-colors">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">📈 Charts</h2>
        <div class="flex gap-2">
          <button onclick="setChartView('cost')" id="chartBtnCost" class="text-xs px-3 py-1 rounded-lg bg-emerald-500 text-white">Cost</button>
          <button onclick="setChartView('energy')" id="chartBtnEnergy" class="text-xs px-3 py-1 rounded-lg bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300">Energy</button>
          <button onclick="setChartView('sessions')" id="chartBtnSessions" class="text-xs px-3 py-1 rounded-lg bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300">Sessions</button>
        </div>
      </div>
      <div class="relative h-64">
        <canvas id="mainChart"></canvas>
      </div>
    </div>

    <!-- Monthly Breakdown -->
    <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm mb-4 transition-colors">
      <div class="flex justify-between items-center">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">📅 Monthly Breakdown</h2>
        <button onclick="toggleMonths()" id="monthsToggle" class="text-sm text-emerald-600 dark:text-emerald-400 hover:text-emerald-700 dark:hover:text-emerald-300 font-medium">Show</button>
      </div>
      <div id="monthlyBreakdown" style="display:none;" class="mt-4"></div>
    </div>

    <!-- All Sessions -->
    <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm transition-colors">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">🔋 All Sessions</h2>
      <div id="sessionsList"></div>
    </div>
  </main>

  <!-- Session Note Modal -->
  <div id="noteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 w-full max-w-md mx-4 shadow-xl">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Edit Note</h3>
      <input type="hidden" id="noteSessionId" />
      <textarea id="noteText" rows="3" placeholder="e.g., Road trip prep, Weekly top-up..." 
        class="w-full rounded-lg border border-gray-300 dark:border-gray-600 py-2.5 px-3 text-gray-900 dark:text-white dark:bg-gray-700 focus:border-emerald-500 focus:ring-emerald-500 text-sm"></textarea>
      <div class="flex gap-3 mt-4">
        <button onclick="closeNoteModal()" class="flex-1 py-2 px-4 rounded-lg font-medium text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition">Cancel</button>
        <button onclick="saveNote()" class="flex-1 py-2 px-4 rounded-lg font-medium text-white bg-emerald-500 hover:bg-emerald-600 transition">Save</button>
      </div>
    </div>
  </div>

  <!-- Session Merge Modal -->
  <div id="mergeModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 w-full max-w-lg mx-4 shadow-xl">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-2">🔗 Merge Sessions</h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Select neighboring sessions to merge (same user, within 30 min)</p>
      <input type="hidden" id="mergeMainSessionId" />
      <div id="mergeSessionsList" class="max-h-64 overflow-y-auto space-y-2 mb-4"></div>
      <div id="mergePreview" class="p-3 bg-emerald-50 dark:bg-emerald-900/30 rounded-lg mb-4 hidden">
        <div class="text-sm font-medium text-emerald-700 dark:text-emerald-300">Merged result:</div>
        <div id="mergePreviewDetails" class="text-sm text-gray-600 dark:text-gray-400 mt-1"></div>
      </div>
      <div class="flex gap-3">
        <button onclick="closeMergeModal()" class="flex-1 py-2 px-4 rounded-lg font-medium text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition">Cancel</button>
        <button onclick="confirmMerge()" id="mergeConfirmBtn" disabled class="flex-1 py-2 px-4 rounded-lg font-medium text-white bg-emerald-500 hover:bg-emerald-600 disabled:bg-gray-300 disabled:cursor-not-allowed transition">Merge Selected</button>
      </div>
    </div>
  </div>

  <!-- User Switch Modal -->
  <div id="userModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 w-full max-w-sm mx-4 shadow-xl">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Switch User</h3>
      <input type="hidden" id="userSessionId" />
      <div id="userList" class="space-y-2 max-h-64 overflow-y-auto"></div>
      <div class="flex gap-3 mt-4">
        <button onclick="closeUserModal()" class="flex-1 py-2 px-4 rounded-lg font-medium text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition">Cancel</button>
      </div>
    </div>
  </div>

<script>
let availableUsers = [];

// User Modal functions
function openUserModal(sessionId, currentUser) {
  document.getElementById('userSessionId').value = sessionId;
  const container = document.getElementById('userList');
  container.innerHTML = availableUsers.map(u => {
    const isSelected = u === currentUser;
    return `<button onclick="saveUser('${u.replace(/'/g, "\\'")}')" class="w-full text-left px-4 py-2.5 rounded-lg font-medium transition flex items-center gap-2 ${isSelected ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300 border border-emerald-300 dark:border-emerald-700' : 'bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-600 border border-transparent'}">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      ${u}${isSelected ? ' <span class="text-xs ml-auto">(current)</span>' : ''}
    </button>`;
  }).join('');
  document.getElementById('userModal').classList.remove('hidden');
}

function closeUserModal() {
  document.getElementById('userModal').classList.add('hidden');
}

async function saveUser(user) {
  const sessionId = document.getElementById('userSessionId').value;
  try {
    const r = await fetch('/api/session/' + sessionId + '/user', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ user })
    });
    if (r.ok) {
      closeUserModal();
      loadSessions();
    }
  } catch(e) {}
}

// Note Modal functions
function openNoteModal(sessionId, currentNote) {
  document.getElementById('noteSessionId').value = sessionId;
  document.getElementById('noteText').value = currentNote || '';
  document.getElementById('noteModal').classList.remove('hidden');
  document.getElementById('noteText').focus();
}

function closeNoteModal() {
  document.getElementById('noteModal').classList.add('hidden');
}

async function saveNote() {
  const sessionId = document.getElementById('noteSessionId').value;
  const note = document.getElementById('noteText').value.trim();
  
  try {
    const r = await fetch('/api/session/' + sessionId + '/note', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ note })
    });
    if (r.ok) {
      closeNoteModal();
      // Refresh sessions to show updated note
      loadSessions();
    }
  } catch(e) {}
}

async function deleteSession(sessionId, energyLabel) {
  if (!confirm('Delete this session (' + energyLabel + ')? This cannot be undone.')) return;
  try {
    const r = await fetch('/api/session/' + sessionId, { method: 'DELETE' });
    const data = await r.json();
    if (data.ok) {
      loadSessions();
    } else {
      alert(data.error || 'Failed to delete session');
    }
  } catch (e) {
    alert('Failed to delete session: ' + e.message);
  }
}

// Merge Modal functions
let mergeMainSession = null;
let mergeNeighbors = [];
let mergeSelected = new Set();

async function openMergeModal(sessionId) {
  mergeSelected.clear();
  mergeSelected.add(sessionId);
  
  document.getElementById('mergeMainSessionId').value = sessionId;
  document.getElementById('mergeSessionsList').innerHTML = '<div class="text-center py-4"><svg class="w-6 h-6 mx-auto animate-spin text-emerald-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle></svg></div>';
  document.getElementById('mergePreview').classList.add('hidden');
  document.getElementById('mergeConfirmBtn').disabled = true;
  document.getElementById('mergeModal').classList.remove('hidden');
  
  try {
    const r = await fetch('/api/session/' + sessionId + '/neighbors');
    if (!r.ok) throw new Error('Failed to fetch');
    const data = await r.json();
    
    if (!data.ok) {
      document.getElementById('mergeSessionsList').innerHTML = '<div class="text-red-500">Error: ' + (data.error || 'Unknown error') + '</div>';
      return;
    }
    
    mergeMainSession = data.session;
    mergeNeighbors = data.neighbors || [];
    
    if (mergeNeighbors.length === 0) {
      document.getElementById('mergeSessionsList').innerHTML = '<div class="text-gray-500 dark:text-gray-400 text-center py-4">No neighboring sessions found (same user, within 30 min gap)</div>';
      return;
    }
    
    renderMergeList();
  } catch(e) {
    document.getElementById('mergeSessionsList').innerHTML = '<div class="text-red-500">Failed to load neighbors</div>';
  }
}

function renderMergeList() {
  const allToShow = [mergeMainSession, ...mergeNeighbors].sort((a, b) => 
    new Date(a.started_at) - new Date(b.started_at)
  );
  
  const html = allToShow.map(s => {
    const energy = getSessionEnergy(s).toFixed(1);
    const isMain = s.id === mergeMainSession.id;
    const isChecked = mergeSelected.has(s.id);
    
    return `<label class="flex items-center gap-3 p-3 rounded-lg border ${isChecked ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20' : 'border-gray-200 dark:border-gray-600'} cursor-pointer hover:border-emerald-400 transition">
      <input type="checkbox" ${isChecked ? 'checked' : ''} ${isMain ? 'disabled' : ''} onchange="toggleMergeSession('${s.id}')" class="w-4 h-4 text-emerald-500 rounded focus:ring-emerald-500">
      <div class="flex-1">
        <div class="font-medium text-gray-900 dark:text-white">${energy} kWh ${isMain ? '<span class="text-xs text-emerald-500">(selected)</span>' : ''}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">${fmtDate(s.started_at)} → ${s.ended_at ? fmtDate(s.ended_at) : 'ongoing'}</div>
      </div>
    </label>`;
  }).join('');
  
  document.getElementById('mergeSessionsList').innerHTML = html;
  updateMergePreview();
}

function toggleMergeSession(sessionId) {
  if (mergeSelected.has(sessionId)) {
    mergeSelected.delete(sessionId);
  } else {
    mergeSelected.add(sessionId);
  }
  renderMergeList();
}

function updateMergePreview() {
  const btn = document.getElementById('mergeConfirmBtn');
  const preview = document.getElementById('mergePreview');
  
  if (mergeSelected.size < 2) {
    btn.disabled = true;
    preview.classList.add('hidden');
    return;
  }
  
  // Check for gaps - all sessions sorted by time
  const allSorted = [mergeMainSession, ...mergeNeighbors].sort((a, b) => 
    new Date(a.started_at) - new Date(b.started_at)
  );
  
  // Find indices of selected sessions
  const selectedIndices = [];
  allSorted.forEach((s, i) => {
    if (mergeSelected.has(s.id)) selectedIndices.push(i);
  });
  
  // Check if indices are consecutive (no gaps)
  let hasGap = false;
  for (let i = 1; i < selectedIndices.length; i++) {
    if (selectedIndices[i] - selectedIndices[i-1] > 1) {
      hasGap = true;
      break;
    }
  }
  
  preview.classList.remove('hidden');
  
  if (hasGap) {
    btn.disabled = true;
    document.getElementById('mergePreviewDetails').innerHTML = `
      <div class="text-red-500 font-medium">⚠️ Cannot merge with gaps!</div>
      <div class="text-red-400 text-xs">Selected sessions must be consecutive. Deselect sessions in between or select them too.</div>
    `;
    return;
  }
  
  btn.disabled = false;
  
  // Calculate merged stats
  const allToMerge = allSorted.filter(s => mergeSelected.has(s.id));
  const first = allToMerge[0];
  const last = allToMerge[allToMerge.length - 1];
  
  // Sum up individual session energies
  const totalEnergy = allToMerge.reduce((sum, s) => sum + getSessionEnergy(s), 0);
  
  document.getElementById('mergePreviewDetails').innerHTML = `
    <div>⚡ ${totalEnergy.toFixed(1)} kWh total</div>
    <div>🕐 ${fmtDate(first.started_at)} → ${last.ended_at ? fmtDate(last.ended_at) : 'ongoing'}</div>
    <div>📦 Merging ${mergeSelected.size} sessions</div>
  `;
}

function closeMergeModal() {
  document.getElementById('mergeModal').classList.add('hidden');
}

async function confirmMerge() {
  if (mergeSelected.size < 2) return;
  
  const btn = document.getElementById('mergeConfirmBtn');
  btn.disabled = true;
  btn.textContent = 'Merging...';
  
  try {
    const r = await fetch('/api/sessions/merge', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ session_ids: Array.from(mergeSelected) })
    });
    
    const data = await r.json();
    
    if (data.ok) {
      closeMergeModal();
      loadSessions();
    } else {
      alert('Merge failed: ' + (data.error || 'Unknown error'));
    }
  } catch(e) {
    alert('Merge failed: ' + e.message);
  }
  
  btn.disabled = false;
  btn.textContent = 'Merge Selected';
}

// Dark mode init
const isDarkMode = (function() {
  // Dark mode is already applied in head, this just ensures consistency
  const isDark = localStorage.getItem('darkMode') !== 'false';
  if (isDark) document.documentElement.classList.add('dark');
  else document.documentElement.classList.remove('dark');
  return isDark;
})();

let pricePerKwh = 0;
let clockSettings = { clock_start: '23:00', clock_end: '07:00' };
let clockDiscountPercent = 20;
let loadedSessions = [];  // Only the sessions loaded so far (paginated)
let selectedUser = '';
let mainChart = null;
let currentChartView = 'cost';
let currentPage = 0;
let hasMore = false;
let totalSessions = 0;
const PAGE_SIZE = 30;

function fmtDate(isoStr){
  if (!isoStr) return '?';
  try {
    const d = new Date(isoStr);
    return d.toLocaleString('he-IL', {
      timeZone: 'Asia/Jerusalem',
      day: '2-digit',
      month: '2-digit',
      year: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    });
  } catch(e) {
    return isoStr;
  }
}

function isMinuteInClock(minute) {
  const [startH, startM] = clockSettings.clock_start.split(':').map(Number);
  const [endH, endM] = clockSettings.clock_end.split(':').map(Number);
  const startMinutes = startH * 60 + startM;
  const endMinutes = endH * 60 + endM;

  if (startMinutes <= endMinutes) {
    return minute >= startMinutes && minute < endMinutes;
  } else {
    return minute >= startMinutes || minute < endMinutes;
  }
}

function calcClockMinutes(startedAt, endedAt) {
  const startDate = new Date(startedAt);
  const endDate = endedAt ? new Date(endedAt) : new Date();
  const totalMins = Math.max(0, Math.round((endDate - startDate) / 60000));
  
  if (totalMins === 0) return { clockMins: 0, nonClockMins: 0 };
  
  const [startH, startM] = clockSettings.clock_start.split(':').map(Number);
  const [endH, endM] = clockSettings.clock_end.split(':').map(Number);
  const clockStart = startH * 60 + startM;
  const clockEnd = endH * 60 + endM;
  
  if (totalMins <= 1440) {
    let clockMins = 0;
    const step = Math.max(1, Math.floor(totalMins / 100));
    for (let i = 0; i < totalMins; i += step) {
      const t = new Date(startDate.getTime() + i * 60000);
      const jTime = new Date(t.toLocaleString('en-US', { timeZone: 'Asia/Jerusalem' }));
      const minuteOfDay = jTime.getHours() * 60 + jTime.getMinutes();
      
      const inClock = clockStart <= clockEnd 
        ? (minuteOfDay >= clockStart && minuteOfDay < clockEnd)
        : (minuteOfDay >= clockStart || minuteOfDay < clockEnd);
      
      if (inClock) clockMins += step;
    }
    clockMins = Math.min(clockMins, totalMins);
    return { clockMins, nonClockMins: totalMins - clockMins };
  }
  
  const clockHoursPerDay = clockStart <= clockEnd 
    ? (clockEnd - clockStart) / 60 
    : (1440 - clockStart + clockEnd) / 60;
  const clockRatio = clockHoursPerDay / 24;
  const clockMins = Math.round(totalMins * clockRatio);
  return { clockMins, nonClockMins: totalMins - clockMins };
}

function calcSessionCost(energyVal, startedAt, endedAt) {
  if (energyVal <= 0) return 0;

  const { clockMins, nonClockMins } = calcClockMinutes(startedAt, endedAt);
  const totalMins = clockMins + nonClockMins;

  if (totalMins === 0) return energyVal * pricePerKwh;

  const clockEnergy = energyVal * (clockMins / totalMins);
  const nonClockEnergy = energyVal * (nonClockMins / totalMins);

  const discountMultiplier = 1 - (clockDiscountPercent / 100);
  const clockCost = clockEnergy * pricePerKwh * discountMultiplier;
  const nonClockCost = nonClockEnergy * pricePerKwh;

  return clockCost + nonClockCost;
}

function getSessionEnergy(s) {
  if (s.session_energy_kwh != null) return s.session_energy_kwh;
  if (s.end_amount_kwh != null && s.start_amount_kwh != null) {
    return s.end_amount_kwh - s.start_amount_kwh;
  }
  return 0;
}

function getSessionDurationMins(s) {
  if (!s.started_at) return 0;
  const start = new Date(s.started_at);
  const end = s.ended_at ? new Date(s.ended_at) : new Date();
  return (end - start) / 60000;
}

function fmtDuration(mins) {
  if (mins < 60) return Math.round(mins) + ' min';
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return h + 'h ' + m + 'm';
}

function getMonthKey(isoStr) {
  if (!isoStr) return null;
  const d = new Date(isoStr);
  const jTime = new Date(d.toLocaleString('en-US', { timeZone: 'Asia/Jerusalem' }));
  const year = jTime.getFullYear();
  const month = String(jTime.getMonth() + 1).padStart(2, '0');
  return `${year}-${month}`;
}

function getMonthName(monthKey) {
  const [year, month] = monthKey.split('-');
  const d = new Date(year, parseInt(month) - 1, 1);
  return d.toLocaleString('en-US', { month: 'short', year: 'numeric' });
}

function getMonthShortName(monthKey) {
  const [year, month] = monthKey.split('-');
  const d = new Date(year, parseInt(month) - 1, 1);
  return d.toLocaleString('en-US', { month: 'short' });
}

// Chart data is now provided by the server summary
let cachedChartData = null;

function getChartData() {
  if (!cachedChartData) return { labels: [], cost: [], energy: [], sessions: [] };
  return cachedChartData;
}

function buildChartData(chartMonths) {
  cachedChartData = {
    labels: chartMonths.map(m => getMonthShortName(m.month)),
    cost: chartMonths.map(m => m.cost),
    energy: chartMonths.map(m => m.kwh),
    sessions: chartMonths.map(m => m.count)
  };
}

function setChartView(view) {
  currentChartView = view;
  
  // Update button styles
  ['cost', 'energy', 'sessions'].forEach(v => {
    const btn = document.getElementById('chartBtn' + v.charAt(0).toUpperCase() + v.slice(1));
    if (v === view) {
      btn.className = 'text-xs px-3 py-1 rounded-lg bg-emerald-500 text-white';
    } else {
      btn.className = 'text-xs px-3 py-1 rounded-lg bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300';
    }
  });
  
  renderChart();
}

function renderChart() {
  const ctx = document.getElementById('mainChart').getContext('2d');
  const data = getChartData();
  const isDark = document.documentElement.classList.contains('dark');
  
  const configs = {
    cost: {
      label: 'Cost (₪)',
      data: data.cost,
      backgroundColor: 'rgba(16, 185, 129, 0.8)',
      borderColor: 'rgb(16, 185, 129)',
      prefix: '₪',
      suffix: ''
    },
    energy: {
      label: 'Energy (kWh)',
      data: data.energy,
      backgroundColor: 'rgba(59, 130, 246, 0.8)',
      borderColor: 'rgb(59, 130, 246)',
      prefix: '',
      suffix: ' kWh'
    },
    sessions: {
      label: 'Sessions',
      data: data.sessions,
      backgroundColor: 'rgba(168, 85, 247, 0.8)',
      borderColor: 'rgb(168, 85, 247)',
      prefix: '',
      suffix: ''
    }
  };
  
  const config = configs[currentChartView];
  
  if (mainChart) {
    mainChart.destroy();
  }
  
  mainChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.labels,
      datasets: [{
        label: config.label,
        data: config.data,
        backgroundColor: config.backgroundColor,
        borderColor: config.borderColor,
        borderWidth: 2,
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: false
        },
        tooltip: {
          backgroundColor: isDark ? '#374151' : '#fff',
          titleColor: isDark ? '#fff' : '#111827',
          bodyColor: isDark ? '#d1d5db' : '#4b5563',
          borderColor: isDark ? '#4b5563' : '#e5e7eb',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 8,
          callbacks: {
            label: function(context) {
              return config.prefix + context.raw.toFixed(currentChartView === 'sessions' ? 0 : 1) + config.suffix;
            }
          }
        }
      },
      scales: {
        x: {
          grid: {
            display: false
          },
          ticks: {
            color: isDark ? '#9ca3af' : '#6b7280'
          }
        },
        y: {
          beginAtZero: true,
          grid: {
            color: isDark ? '#374151' : '#f3f4f6'
          },
          ticks: {
            color: isDark ? '#9ca3af' : '#6b7280',
            callback: function(value) {
              return config.prefix + value + (currentChartView === 'energy' ? '' : '');
            }
          }
        }
      }
    }
  });
}

function renderStats(summary) {
  document.getElementById('stats').innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
      <div class="text-center p-4 bg-emerald-50 dark:bg-emerald-900/30 rounded-xl">
        <div class="text-2xl font-bold text-emerald-600 dark:text-emerald-400">₪${Math.round(summary.month_cost)}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">This Month</div>
      </div>
      <div class="text-center p-4 bg-emerald-50 dark:bg-emerald-900/30 rounded-xl">
        <div class="text-2xl font-bold text-emerald-600 dark:text-emerald-400">₪${Math.round(summary.total_cost)}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">All Time</div>
      </div>
      <div class="text-center p-4 bg-gray-100 dark:bg-gray-700 rounded-xl">
        <div class="text-2xl font-bold text-gray-700 dark:text-gray-200">${Math.round(summary.month_kwh)}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">kWh This Month</div>
      </div>
      <div class="text-center p-4 bg-gray-100 dark:bg-gray-700 rounded-xl">
        <div class="text-2xl font-bold text-gray-700 dark:text-gray-200">${Math.round(summary.total_kwh)}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">kWh All Time</div>
      </div>
      <div class="text-center p-4 bg-gray-100 dark:bg-gray-700 rounded-xl">
        <div class="text-2xl font-bold text-gray-700 dark:text-gray-200">${summary.total_sessions}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">Total Sessions</div>
      </div>
      <div class="text-center p-4 bg-gray-100 dark:bg-gray-700 rounded-xl">
        <div class="text-2xl font-bold text-gray-700 dark:text-gray-200">${summary.month_sessions}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">Sessions This Month</div>
      </div>
    </div>
    <div class="text-center p-3 bg-amber-50 dark:bg-amber-900/30 rounded-xl">
      🏆 <span class="font-semibold text-gray-900 dark:text-white">Biggest charge:</span> <span class="text-gray-700 dark:text-gray-300">${summary.biggest_kwh.toFixed(1)} kWh by ${summary.biggest_user}</span>
    </div>
  `;
}

function renderMonthlyBreakdown(monthlyList) {
  const html = monthlyList.map(m => {
    return `<div class="flex justify-between items-center py-2 border-b border-gray-100 dark:border-gray-700 last:border-0">
      <div>
        <span class="font-semibold text-gray-900 dark:text-white">${getMonthName(m.month)}</span>
        <span class="text-sm text-gray-500 dark:text-gray-400 ml-2">(${m.count} sessions)</span>
      </div>
      <div class="text-right">
        <span class="font-semibold text-gray-900 dark:text-white">${Math.round(m.kwh)} kWh</span>
        <span class="text-gray-500 dark:text-gray-400 mx-1">·</span>
        <span class="font-semibold text-emerald-600 dark:text-emerald-400">₪${Math.round(m.cost)}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('monthlyBreakdown').innerHTML = html || '<div class="text-gray-500 dark:text-gray-400">No data</div>';
}

function toggleMonths() {
  const el = document.getElementById('monthlyBreakdown');
  const btn = document.getElementById('monthsToggle');
  if (el.style.display === 'none') {
    el.style.display = 'block';
    btn.innerText = 'Hide';
  } else {
    el.style.display = 'none';
    btn.innerText = 'Show';
  }
}

function fmtSession(s){
  const start = fmtDate(s.started_at);
  const ongoing = !s.ended_at;
  const end = ongoing ? '⚡ ongoing' : fmtDate(s.ended_at);

  const energyVal = getSessionEnergy(s);
  const energy = energyVal.toFixed(1) + ' kWh';
  const cost = '₪' + calcSessionCost(energyVal, s.started_at, s.ended_at).toFixed(2);

  const user = (s.meta && s.meta.user) ? s.meta.user : 'Unknown';
  const note = (s.meta && s.meta.note) ? s.meta.note : '';
  const mergedFrom = (s.meta && s.meta.merged_from) ? s.meta.merged_from : null;

  return `<div class="py-3 border-b border-gray-100 dark:border-gray-700 last:border-0 flex items-center gap-3">
    <div class="flex-1">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="font-bold text-gray-900 dark:text-white">${energy}</span>
        <span class="text-gray-400 dark:text-gray-500">·</span>
        <span class="text-gray-600 dark:text-gray-400">${cost}</span>
        <span class="text-gray-400 dark:text-gray-500">·</span>
        <span class="text-gray-600 dark:text-gray-400">${user}</span>
        ${ongoing ? '<span class="text-emerald-500 font-medium">🔌 Charging</span>' : ''}
        ${mergedFrom ? '<span class="text-xs text-purple-500 dark:text-purple-400">🔗 merged</span>' : ''}
        ${note ? `<span class="text-gray-400 dark:text-gray-500">·</span><span class="text-amber-600 dark:text-amber-400 italic text-sm">${note}</span>` : ''}
      </div>
      <div class="text-xs text-gray-400 dark:text-gray-500 mt-1">${start} → ${end}</div>
    </div>
    <button onclick="openUserModal('${s.id}', '${user.replace(/'/g, "\\'")}')" class="text-gray-400 dark:text-gray-500 hover:text-blue-500 dark:hover:text-blue-400 px-2 transition" title="Switch user">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
    </button>
    ${!ongoing ? `<button onclick="openMergeModal('${s.id}')" class="text-gray-400 dark:text-gray-500 hover:text-purple-500 dark:hover:text-purple-400 px-2 transition" title="Merge with neighbors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
    </button>` : ''}
    <button onclick="openNoteModal('${s.id}', '${note.replace(/'/g, "\\'")}')" class="text-gray-400 dark:text-gray-500 hover:text-emerald-500 dark:hover:text-emerald-400 px-2 transition" title="${note || 'Add note'}">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
    </button>
    ${!ongoing ? `<button onclick="deleteSession('${s.id}', '${energy}')" class="text-gray-400 dark:text-gray-500 hover:text-red-500 dark:hover:text-red-400 px-2 transition" title="Delete session">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
    </button>` : ''}
  </div>`;
}

async function loadSettings(){
  try {
    const r = await fetch('/api/settings');
    if (!r.ok) return;
    const s = await r.json();
    pricePerKwh = s.price_per_kwh;
    clockDiscountPercent = s.clock_discount_percent ?? 20;
    clockSettings.clock_start = s.clock_start || '23:00';
    clockSettings.clock_end = s.clock_end || '07:00';
    availableUsers = s.users || ['User'];
  } catch(e) {}
}

function populateUserFilter(users) {
  const select = document.getElementById('userFilter');
  select.innerHTML = '<option value="">All Users</option>' +
    users.map(u => `<option value="${u}"${u === selectedUser ? ' selected' : ''}>${u}</option>`).join('');
}

function renderSessionsList() {
  const container = document.getElementById('sessionsList');

  if (!loadedSessions.length) {
    container.innerHTML = '<div class="text-gray-500 dark:text-gray-400">No sessions for this user.</div>';
    return;
  }

  let html = loadedSessions.map(fmtSession).join('');

  if (hasMore) {
    html += `<button onclick="loadMore()" id="loadMoreBtn" class="w-full py-3 mt-4 rounded-lg font-medium text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/30 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition">
      Load More (showing ${loadedSessions.length} of ${totalSessions})
    </button>`;
  }

  container.innerHTML = html;
}

async function loadMore() {
  const btn = document.getElementById('loadMoreBtn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Loading...';
  }

  currentPage++;
  const userParam = selectedUser ? '&user=' + encodeURIComponent(selectedUser) : '';
  try {
    const r = await fetch('/api/sessions?page=' + currentPage + '&page_size=' + PAGE_SIZE + userParam);
    if (!r.ok) return;
    const data = await r.json();
    loadedSessions = loadedSessions.concat(data.sessions || []);
    hasMore = data.has_more;
    totalSessions = data.total;
    renderSessionsList();
  } catch(e) {
    if (btn) {
      btn.disabled = false;
      btn.textContent = 'Retry';
    }
  }
}

async function applyFilter() {
  selectedUser = document.getElementById('userFilter').value;
  currentPage = 1;
  loadedSessions = [];
  hasMore = false;

  const spinner = '<div class="text-center py-4"><svg class="w-6 h-6 mx-auto animate-spin text-emerald-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></div>';
  document.getElementById('stats').innerHTML = spinner;
  document.getElementById('sessionsList').innerHTML = spinner;

  const userParam = selectedUser ? '?user=' + encodeURIComponent(selectedUser) : '';

  try {
    // Fetch summary and first page in parallel
    const [summaryRes, sessionsRes] = await Promise.all([
      fetch('/api/sessions/summary' + userParam),
      fetch('/api/sessions?page=1&page_size=' + PAGE_SIZE + (selectedUser ? '&user=' + encodeURIComponent(selectedUser) : ''))
    ]);

    if (!summaryRes.ok || !sessionsRes.ok) return;

    const summary = await summaryRes.json();
    const sessionsData = await sessionsRes.json();

    loadedSessions = sessionsData.sessions || [];
    hasMore = sessionsData.has_more;
    totalSessions = sessionsData.total;

    // Update stats, charts, monthly from summary
    renderStats(summary);
    buildChartData(summary.chart_months || []);
    renderChart();
    renderMonthlyBreakdown(summary.monthly || []);
    populateUserFilter(summary.users || []);
    renderSessionsList();
  } catch(e) {}
}

async function loadSessions(){
  try {
    const userParam = selectedUser ? '?user=' + encodeURIComponent(selectedUser) : '';

    // Fetch summary and first page in parallel
    const [summaryRes, sessionsRes] = await Promise.all([
      fetch('/api/sessions/summary' + userParam),
      fetch('/api/sessions?page=1&page_size=' + PAGE_SIZE + (selectedUser ? '&user=' + encodeURIComponent(selectedUser) : ''))
    ]);

    if (!summaryRes.ok || !sessionsRes.ok) return;

    const summary = await summaryRes.json();
    const sessionsData = await sessionsRes.json();

    currentPage = 1;
    loadedSessions = sessionsData.sessions || [];
    hasMore = sessionsData.has_more;
    totalSessions = sessionsData.total;

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('contentArea').style.display = 'block';

    if (summary.total_sessions === 0) {
      document.getElementById('stats').innerHTML = '<div class="text-gray-500 dark:text-gray-400">No sessions yet.</div>';
      document.getElementById('sessionsList').innerHTML = '<div class="text-gray-500 dark:text-gray-400">No sessions yet.</div>';
      return;
    }

    renderStats(summary);
    buildChartData(summary.chart_months || []);
    renderChart();
    renderMonthlyBreakdown(summary.monthly || []);
    populateUserFilter(summary.users || []);
    renderSessionsList();
  } catch(e) {
    document.getElementById('loadingState').innerHTML = '<div class="text-center text-red-500">❌ Failed to load sessions.</div>';
  }
}

loadSettings().then(() => loadSessions());
</script>
